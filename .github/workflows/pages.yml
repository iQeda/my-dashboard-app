name: Deploy LP to GitHub Pages

on:
  push:
    branches: [main]
    paths: [lp/**]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/configure-pages@v5
      # デザインソース (*.pen) とドキュメント (*.md) は公開しない
      - name: Stage public files
        run: |
          mkdir -p _site
          rsync -a --exclude='*.pen' --exclude='*.md' lp/ _site/
      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site
      - id: deployment
        uses: actions/deploy-pages@v4

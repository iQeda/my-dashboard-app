name: Release

on:
  push:
    tags:
      - "v*"

jobs:
  release:
    runs-on: macos-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - run: pnpm install --frozen-lockfile

      - name: Install Tauri CLI
        run: cargo install tauri-cli --version "^2"

      - name: Build Tauri app
        run: cargo tauri build
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}

      - name: Get version from tag
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        run: |
          gh release create "$GITHUB_REF_NAME" \
            src-tauri/target/release/bundle/macos/MyDashboard.app.tar.gz \
            src-tauri/target/release/bundle/macos/MyDashboard.app.tar.gz.sig \
            "src-tauri/target/release/bundle/dmg/MyDashboard_${{ steps.version.outputs.version }}_aarch64.dmg" \
            --title "$GITHUB_REF_NAME" \
            --generate-notes
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload latest.json
        run: |
          SIGNATURE=$(cat src-tauri/target/release/bundle/macos/MyDashboard.app.tar.gz.sig)
          DATE=$(date -u +"%Y-%m-%dT%H:%M:%SZ")
          VERSION="${{ steps.version.outputs.version }}"
          cat > latest.json <<EOF
          {
            "version": "$VERSION",
            "pub_date": "$DATE",
            "platforms": {
              "darwin-aarch64": {
                "signature": "$SIGNATURE",
                "url": "https://github.com/iQeda/my-dashboard-app/releases/download/v$VERSION/MyDashboard.app.tar.gz"
              }
            }
          }
          EOF
          gh release upload "$GITHUB_REF_NAME" latest.json --clobber
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Update Homebrew Cask
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          SHA256=$(shasum -a 256 src-tauri/target/release/bundle/macos/MyDashboard.app.tar.gz | awk '{print $1}')

          git clone https://x-access-token:${{ secrets.HOMEBREW_TAP_TOKEN }}@github.com/iQeda/homebrew-tap.git /tmp/homebrew-tap
          cat > /tmp/homebrew-tap/Casks/mydashboard.rb <<EOF
          cask "mydashboard" do
            version "$VERSION"
            sha256 "$SHA256"

            url "https://github.com/iQeda/my-dashboard-app/releases/download/v#{version}/MyDashboard.app.tar.gz"
            name "MyDashboard"
            desc "Mac app/site launcher dashboard"
            homepage "https://github.com/iQeda/my-dashboard-app"

            depends_on macos: ">= :ventura"
            depends_on arch: :arm64

            app "MyDashboard.app"

            postflight do
              system_command "/usr/bin/xattr",
                             args: ["-cr", "#{appdir}/MyDashboard.app"],
                             sudo: false
            end

            zap trash: [
              "~/Library/Mobile Documents/com~apple~CloudDocs/my-dashboard-app",
              "~/.config/my-dashboard-app",
            ]
          end
          EOF

          cd /tmp/homebrew-tap
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Casks/mydashboard.rb
          git commit -m "Update MyDashboard cask to v$VERSION"
          git push
